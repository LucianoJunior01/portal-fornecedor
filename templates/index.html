<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Fornecedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .header {
            background-color: #2e7d32;
            color: white;
            padding: 20px 30px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="header">
    <h3><i class="bi bi-truck"></i> Portal do Fornecedor</h3>
    <small>Envio de Nota Fiscal para o Almoxarifado</small>
</div>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <i class="bi bi-file-earmark-text"></i> Preencha os dados da Nota Fiscal
        </div>
        <div class="card-body">
            <form method="POST" action="/enviar">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Fornecedor *</label>
                        <select name="fornecedor_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for f in fornecedores %}
                            <option value="{{ f['id'] }}">{{ f['nome'] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Produto *</label>
                        <select name="produto_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for p in produtos %}
                            <option value="{{ p['id'] }}">{{ p['nome'] }} ({{ p['codigo'] }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Número da NF *</label>
                        <input type="text" name="numero_nf" class="form-control" placeholder="Ex: 000123" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Quantidade *</label>
                        <input type="number" step="0.01" name="quantidade" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço Unitário (R$) *</label>
                        <input type="number" step="0.01" name="preco_unitario" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data da NF *</label>
                        <input type="date" name="data" class="form-control" value="{{ hoje }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Motivo</label>
                        <input type="text" name="motivo" class="form-control" placeholder="Ex: Entrega mensal">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-send"></i> Enviar Nota Fiscal
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
